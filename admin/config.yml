backend:
  name: git-gateway
  branch: main

publish_mode: editorial_workflow

media_folder: "assets/img"
public_folder: "/assets/img"

collections:
  - name: "pages"
    label: "Website Pages"
    files:
      - file: "_pages/about.md"
        label: "Homepage (Our Research)"
        name: "about"
        fields:
          - {label: "Page Name (Internal)", name: "title", widget: "string"}
          - {label: "Main Heading", name: "main_heading", widget: "string"}
          - {label: "Main Description", name: "main_description", widget: "markdown"}
          - label: "Research Pillars (Tiles)"
            name: "pillars"
            widget: "list"
            label_singular: "Pillar Tile"
            fields:
              - {label: "Tile Title", name: "title", widget: "string"}
              - {label: "Tile Text", name: "description", widget: "markdown"}
      
      - file: "_pages/cv.md"
        label: "Curriculum Vitae (CV)"
        name: "cv"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Content", name: "body", widget: "markdown"}
      
      - file: "_pages/profiles.md"
        label: "Team Profiles"
        name: "profiles"
        fields:
          - {label: "Page Title", name: "title", widget: "string"}
          - label: "Principal Investigator (PI)"
            name: "pi"
            widget: "object"
            fields:
              - {label: "Name", name: "name", widget: "string"}
              - {label: "Role", name: "role", widget: "string"}
              - {label: "Short Bio", name: "bio", widget: "text"}
              - {label: "LinkedIn URL", name: "linkedin", widget: "string", required: false}
              - {label: "Profile Picture", name: "photo", widget: "image", required: false}
          - label: "Lab Members"
            name: "members"
            widget: "list"
            label_singular: "Member"
            fields:
              - {label: "Name", name: "name", widget: "string"}
              - {label: "Role", name: "role", widget: "string"}
              - {label: "Joined Date", name: "joined", widget: "string", required: false}
              - {label: "LinkedIn URL", name: "linkedin", widget: "string", required: false}
              - {label: "Profile Picture", name: "photo", widget: "image", required: false}
          - {label: "Extra Footer Text", name: "extra_text", widget: "markdown", required: false}

      - file: "_pages/media.md"
        label: "Media"
        name: "media"
        fields:
          - {label: "Page Title", name: "title", widget: "string"}
          - {label: "Introduction Text", name: "description", widget: "markdown", required: false}
          - label: "YouTube Videos"
            name: "videos"
            widget: "list"
            label_singular: "Video"
            fields:
              - {label: "Video Title", name: "title", widget: "string"}
              - {label: "YouTube Video ID (e.g., kM7J1PofqB8)", name: "youtube_id", widget: "string"}

      - file: "_pages/teaching.md"
        label: "Teaching"
        name: "teaching"
        fields:
          - {label: "Page Title", name: "title", widget: "string"}
          - {label: "Content", name: "body", widget: "markdown"}

      - file: "_pages/patents.md"
        label: "Patents"
        name: "patents"
        fields:
          - {label: "Page Title", name: "title", widget: "string"}
          - {label: "Content", name: "body", widget: "markdown"}

      - file: "_pages/repositories.md"
        label: "Repositories"
        name: "repositories"
        fields:
          - {label: "Page Title", name: "title", widget: "string"}
          - {label: "Content", name: "body", widget: "markdown"}

      - file: "_pages/privacy.md"
        label: "Privacy Policy"
        name: "privacy"
        fields:
          - {label: "Page Title", name: "title", widget: "string"}
          - {label: "Content", name: "body", widget: "markdown"}

  - name: "news"
    label: "News"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Image (Optional)", name: "image", widget: "image", required: false}
      - {label: "External Link (Optional)", name: "ext_link", widget: "string", required: false}
      - {label: "Content", name: "body", widget: "markdown"}

  - name: "bibliography"
    label: "Publications (BibTeX)"
    files:
      - file: "_bibliography/papers.md"
        label: "Publications Code"
        name: "papers"
        fields:
          - {label: "Do Not Edit", name: "title", widget: "hidden", default: "Bibliography"}
          - {label: "Paste publications in BibTeX format here", name: "body", widget: "code", default_language: "bibtex", output_code_only: true}

  - name: "manual"
    label: "📘 User Manual"
    files:
      - file: "admin/dummy.md"
        label: "📖 How to use the CMS"
        name: "guide"
        description: "👉 **[CLICK HERE TO OPEN THE FULL VISUAL GUIDE](/assets/cms-manual.pdf)**"
        fields:
          - {label: "Info", name: "title", widget: "hidden", default: "Guide"}