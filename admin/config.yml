backend:
  name: git-gateway
  branch: main
  publish_mode: editorial_workflow

# Where to save images
media_folder: "assets/img"
public_folder: "/assets/img"

# The collections editable by the team
collections:
  # 1. YOUR SINGLE PAGES
  - name: "pages"
    label: "Website Pages"
    files:
      - file: "_pages/about.md"
        label: "Homepage (About)"
        name: "about"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Content", name: "body", widget: "markdown"}
      - file: "_pages/cv.md"
        label: "Curriculum Vitae (CV)"
        name: "cv"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Content", name: "body", widget: "markdown"}
      - file: "_pages/teaching.md"
        label: "Teaching"
        name: "teaching"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Content", name: "body", widget: "markdown"}
      - file: "_pages/patents.md"
        label: "Patents"
        name: "patents"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Content", name: "body", widget: "markdown"}
      
      # ---> MAGIC FOR THE TEAM PAGE <---
      - file: "_pages/profiles.md"
        label: "Team Profiles"
        name: "profiles"
        fields:
          - {label: "Page Title", name: "title", widget: "string"}
          
          # Section for PI
          - label: "Principal Investigator (PI)"
            name: "pi"
            widget: "object"
            fields:
              - {label: "Name", name: "name", widget: "string"}
              - {label: "Role", name: "role", widget: "string"}
              - {label: "Short Bio", name: "bio", widget: "text"}
              - {label: "LinkedIn URL", name: "linkedin", widget: "string", required: false}
              - {label: "Profile Picture", name: "photo", widget: "image", required: false}
              
          # List for students/collaborators
          - label: "Lab Members"
            name: "members"
            widget: "list"
            label_singular: "Member"
            fields:
              - {label: "Name", name: "name", widget: "string"}
              - {label: "Role (e.g., Ph.D. Student)", name: "role", widget: "string"}
              - {label: "Joined Date (e.g., Joined Jan 2025)", name: "joined", widget: "string", required: false}
              - {label: "LinkedIn URL", name: "linkedin", widget: "string", required: false}
              - {label: "Profile Picture", name: "photo", widget: "image", required: false}
              
          - {label: "Extra Text (optional, appears at the bottom)", name: "body", widget: "markdown", required: false}

  # 2. NEWS
  - name: "news"
    label: "News"
    folder: "_news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Content", name: "body", widget: "markdown"}

  # 3. PUBLICATIONS
  - name: "bibliography"
    label: "Publications (BibTeX)"
    files:
      - file: "_bibliography/papers.bib"
        label: "Publications Code"
        name: "papers"
        fields:
          - {label: "Paste new publications in BibTeX format here", name: "body", widget: "code", default_language: "bibtex"}