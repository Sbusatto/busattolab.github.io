backend:
  name: git-gateway
  branch: main
  publish_mode: editorial_workflow

media_folder: "assets/img"
public_folder: "/assets/img"

collections:
  - name: "pages"
    label: "Website Pages"
    files:
      - file: "_pages/about.md"
        label: "Homepage (About)"
        name: "about"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Content", name: "body", widget: "markdown"}
      - file: "_pages/cv.md"
        label: "Curriculum Vitae (CV)"
        name: "cv"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Content", name: "body", widget: "markdown"}
      
      # ---> TEAM PAGE (CLEAN VERSION) <---
      - file: "_pages/profiles.md"
        label: "Team Profiles"
        name: "profiles"
        fields:
          - {label: "Page Title", name: "title", widget: "string"}
          - label: "Principal Investigator (PI)"
            name: "pi"
            widget: "object"
            fields:
              - {label: "Name", name: "name", widget: "string"}
              - {label: "Role", name: "role", widget: "string"}
              - {label: "Short Bio", name: "bio", widget: "text"}
              - {label: "LinkedIn URL", name: "linkedin", widget: "string", required: false}
              - {label: "Profile Picture", name: "photo", widget: "image", required: false}
          - label: "Lab Members"
            name: "members"
            widget: "list"
            label_singular: "Member"
            fields:
              - {label: "Name", name: "name", widget: "string"}
              - {label: "Role", name: "role", widget: "string"}
              - {label: "Joined Date", name: "joined", widget: "string", required: false}
              - {label: "LinkedIn URL", name: "linkedin", widget: "string", required: false}
              - {label: "Profile Picture", name: "photo", widget: "image", required: false}
          - {label: "Extra Footer Text", name: "extra_text", widget: "markdown", required: false}

  # ---> LE TUE NEWS <---
  - name: "news"
    label: "News"
    folder: "_news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Content", name: "body", widget: "markdown"}

  # ---> LE TUE PUBBLICAZIONI <---
  - name: "bibliography"
    label: "Publications (BibTeX)"
    files:
      - file: "_bibliography/papers.bib"
        label: "Publications Code"
        name: "papers"
        fields:
          - {label: "Paste new publications in BibTeX format here", name: "body", widget: "code", default_language: "bibtex"}