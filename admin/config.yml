backend:
  name: git-gateway
  branch: main

# Il sistema di approvazione per Sara
publish_mode: editorial_workflow

# Dove salvare le immagini
media_folder: "assets/img"
public_folder: "/assets/img"

# Le sezioni modificabili dal team
collections:
  - name: "pages"
    label: "Website Pages"
    files:
      - label: "Homepage (About)"
        name: "about"
        file: "_pages/about.md"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Body (Main Text)", name: "body", widget: "markdown"}
