backend:
  name: git-gateway
  branch: main
  
  publish_mode: editorial_workflow

# Il sistema di approvazione per Sara
publish_mode: editorial_workflow

# Dove salvare le immagini
media_folder: "assets/img"
public_folder: "/assets/img"

# Le sezioni modificabili dal team
collections:
  # 1. LE TUE PAGINE SINGOLE (Trovate nella cartella _pages!)
  - name: "pages"
    label: "Website Pages"
    files:
      - file: "_pages/about.md"
        label: "Homepage (About)"
        name: "about"
        fields:
          - {label: "Titolo", name: "title", widget: "string"}
          - {label: "Contenuto", name: "body", widget: "markdown"}
      - file: "_pages/cv.md"
        label: "Curriculum Vitae (CV)"
        name: "cv"
        fields:
          - {label: "Titolo", name: "title", widget: "string"}
          - {label: "Contenuto", name: "body", widget: "markdown"}
      - file: "_pages/teaching.md"
        label: "Teaching"
        name: "teaching"
        fields:
          - {label: "Titolo", name: "title", widget: "string"}
          - {label: "Contenuto", name: "body", widget: "markdown"}
      - file: "_pages/patents.md"
        label: "Patents"
        name: "patents"
        fields:
          - {label: "Titolo", name: "title", widget: "string"}
          - {label: "Contenuto", name: "body", widget: "markdown"}
      - file: "_pages/profiles.md"
        label: "Team Profiles"
        name: "profiles"
        fields:
          - {label: "Titolo", name: "title", widget: "string"}
          - {label: "Contenuto", name: "body", widget: "markdown"}

  # 2. NEWS (Punta alla tua cartella _news)
  - name: "news"
    label: "News"
    folder: "_news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Titolo", name: "title", widget: "string"}
      - {label: "Data", name: "date", widget: "datetime"}
      - {label: "Contenuto", name: "body", widget: "markdown"}

  # 3. PUBBLICAZIONI (Punta direttamente al tuo file BibTeX!)
  - name: "bibliography"
    label: "Publications (BibTeX)"
    files:
      - file: "_bibliography/papers.bib"
        label: "Codice Pubblicazioni"
        name: "papers"
        fields:
          - {label: "Incolla qui le nuove pubblicazioni in formato BibTeX", name: "body", widget: "code", default_language: "bibtex"}
