<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bionano Lab - Content Manager</title>
    <!-- Adds the Secure Login Box -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <!-- 1. Diciamo al CMS di NON partire in automatico -->
    <script>
      window.CMS_MANUAL_INIT = true;
    </script>

    <!-- 2. Carichiamo il motore del CMS -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    
    <!-- 3. Gli insegniamo il formato .bib E POI lo facciamo partire -->
    <script>
      CMS.registerFormat('bib', {
        extension: 'bib',
        fromFile: function(content) {
          return { body: content };
        },
        toFile: function(data) {
          return data.body || '';
        }
      });

      // Ora che ha imparato il formato, gli diamo il via libera per avviarsi
      CMS.init();
    </script>

    <!-- Automatically opens the dashboard after a successful login -->
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
  </body>
</html>
